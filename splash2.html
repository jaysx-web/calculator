<!DOCTYPE html>
<html>
<head>
<title>Loading</title>

<style>
body{
background:#1e1e1e;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
color:white;
font-family:Arial;
}

.loading-text{
font-size:22px;
margin-bottom:20px;
}

.dots{
display:flex;
gap:8px;
}

.dot{
width:10px;
height:10px;
background:white;
border-radius:50%;
animation:bounce 1.2s infinite;
}

.dot:nth-child(2){
animation-delay:0.2s;
}

.dot:nth-child(3){
animation-delay:0.4s;
}

@keyframes bounce{
0%,80%,100%{
transform:translateY(0);
opacity:0.5;
}
40%{
transform:translateY(-10px);
opacity:1;
}
}

</style>

</head>

<body>

<div class="loading-text">Starting Calculator</div>

<div class="dots">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

</body>
</html>
