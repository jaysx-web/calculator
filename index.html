<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<!-- PWA MANIFEST LINK -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e1e">

<style>
/* CALCULATOR STYLES */
body {
  background:#1e1e1e;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.calculator {
  background:#2c2c2c;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  width:100%;
  max-width:360px; /* max width for mobile */
  box-sizing:border-box;
  transition:0.3s;
}

#display {
  width:100%;
  height:60px;
  font-size:24px;
  text-align:right;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-bottom:15px;
  background:#111;
  color:white;
  box-sizing:border-box; /* fixes overflow */
}

.buttons {
  display:grid;
  grid-template-columns:repeat(4, 1fr); /* aligned properly */
  gap:10px;
  width:100%;
}

button {
  height:60px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#3b3b3b;
  color:white;
  cursor:pointer;
}

button:hover {
  background:#555;
}

.operator { background:#ff9500; }
.equal { background:#34c759; grid-column:span 4; }
.clear { background:#ff3b30; }
.special { background:#636366; }

/* RED FLASH */
.flash-red {
  animation:flash 0.4s;
}
@keyframes flash {
  0% { background:#2c2c2c; }
  50% { background:#ff3b30; }
  100% { background:#2c2c2c; }
}

/* SHAKE */
.shake {
  animation:shake 0.3s;
}
@keyframes shake {
  0%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  50%{transform:translateX(6px);}
  75%{transform:translateX(-6px);}
  100%{transform:translateX(0);}
}

/* SPLASH SCREENS */
#splash1, #splash2 {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#splash1 {
  background:#1e1e1e;
  color:white;
  font-size:24px;
}

#splash2 {
  background:white;
  visibility:hidden;
}

#splash2 .dot {
  width:15px;
  height:15px;
  background:black;
  border-radius:50%;
  margin:0 5px;
  animation:bounce 1s infinite;
}

#splash2 .dot:nth-child(2) { animation-delay:0.2s; }
#splash2 .dot:nth-child(3) { animation-delay:0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}
</style>
</head>
<body>

<!-- SPLASH SCREENS -->
<div id="splash1">Loading Calculator...</div>
<div id="splash2">
  <div style="display:flex;">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<!-- CALCULATOR -->
<div class="calculator" id="calculator" style="display:none;">
  <input type="text" id="display">

  <div class="buttons">
    <button class="special" onclick="sqrt()">√</button>
    <button class="special" onclick="square()">x²</button>
    <button class="special" onclick="percent()">%</button>
    <button class="clear" onclick="clearDisplay()">C</button>

    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button class="operator" onclick="add('/')">÷</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button class="operator" onclick="add('*')">×</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button class="operator" onclick="add('-')">−</button>

    <button onclick="add('0')">0</button>
    <button onclick="add('.')">.</button>
    <button class="special" onclick="deleteLast()">⌫</button>
    <button class="operator" onclick="add('+')">+</button>

    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<!-- AUDIO -->
<audio id="clickSound" src="click.mp3"></audio>
<audio id="errorSound" src="error.mp3"></audio>

<script>
// SPLASH SCREEN LOGIC
window.addEventListener("load", () => {
  setTimeout(()=>{
    document.getElementById("splash1").style.display="none";
    document.getElementById("splash2").style.visibility="visible";
    setTimeout(()=>{
      document.getElementById("splash2").style.display="none";
      document.getElementById("calculator").style.display="block";
    },3000); // second splash duration
  },3000); // first splash duration
});

// CALCULATOR FUNCTIONS
const clickSound=document.getElementById("clickSound");
const errorSound=document.getElementById("errorSound");

function playClick(){
  clickSound.currentTime=0;
  clickSound.play();
}

function add(value){
  document.getElementById("display").value+=value;
  playClick();
}

function clearDisplay(){
  document.getElementById("display").value="";
  playClick();
}

function deleteLast(){
  let display=document.getElementById("display");
  display.value=display.value.slice(0,-1);
  playClick();
}

function sqrt(){
  let display=document.getElementById("display");
  display.value=Math.sqrt(display.value);
  playClick();
}

function square(){
  let display=document.getElementById("display");
  display.value=Math.pow(display.value,2);
  playClick();
}

function percent(){
  let display=document.getElementById("display");
  display.value=display.value/100;
  playClick();
}

function calculate(){
  const display=document.getElementById("display");
  const calc=document.getElementById("calculator");

  try{
    display.value=eval(display.value);
    playClick();
  } catch{
    display.value="EWAN SAYO BEH";
    calc.classList.add("flash-red");
    calc.classList.add("shake");
    errorSound.currentTime=0;
    errorSound.play();
    setTimeout(()=>{
      calc.classList.remove("flash-red");
      calc.classList.remove("shake");
    },500);
  }
}

// SERVICE WORKER REGISTRATION
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("./service-worker.js")
      .then(function(registration) {
        console.log("ServiceWorker registered:", registration);
      })
      .catch(function(error) {
        console.log("ServiceWorker registration failed:", error);
      });
  });
}
</script>

</body>
</html>
